name: "01 - 🎯 دانلود زیرنویس یوتیوب"

on:
  workflow_dispatch:
    inputs:
      video_urls:
        description: '🔗 لینک ویدیو (چند لینک با فاصله)'
        required: true
        type: string
      embed_font:
        description: '🖊️ همراه با فونت فارسی'
        required: false
        default: false
        type: boolean

jobs:
  download-subtitles:
    name: "📥 دریافت زیرنویس"
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: ⚙️ تنظیم Git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

      - name: 📥 نصب وابستگی‌ها
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y python3-pip zip curl jq bc
          pip3 install --upgrade yt-dlp
          yt-dlp --version

      - name: 🔽 دانلود زیرنویس‌ها
        env:
          YT_URLS: ${{ github.event.inputs.video_urls }}
          EMBED_FONT: ${{ github.event.inputs.embed_font }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          # ========== CONFIG ==========
          BACKUP_DIR="/tmp/sub_backup_$$"
          mkdir -p "$BACKUP_DIR" subtitles
          FONT_FILE="/tmp/IRANSansWeb.ttf"

          # ========== HELPERS ==========
          start_warp() {
            docker rm -f warp 2>/dev/null || true
            docker run -d --name warp --restart=always -p 1080:1080 \
              --cap-add NET_ADMIN \
              --sysctl net.ipv6.conf.all.disable_ipv6=0 \
              --sysctl net.ipv4.conf.all.src_valid_mark=1 \
              -v warp-data:/var/lib/cloudflare-warp \
              caomingjun/warp 2>/dev/null
            sleep 12
            if curl -s --max-time 5 --socks5 127.0.0.1:1080 https://www.youtube.com/ > /dev/null 2>&1; then
              echo "✅ WARP وصل شد"
              return 0
            else
              echo "⚠️ WARP آماده نشد، ادامه بدون پروکسی..."
              return 1
            fi
          }

          stop_warp() {
            docker stop warp 2>/dev/null
            docker rm warp 2>/dev/null
            true
          }

          # دانلود زیرنویس با کلاینت ios (نیاز به PO Token نداره)
          # ریتلای ۳ بار با backoff
          try_download_subs() {
            local URL="$1" OUT_DIR="$2" USE_PROXY="$3"
            local RETRY=0 MAX_RETRY=4 WAIT=5
            local PROXY_ARG=""
            [ "$USE_PROXY" = "true" ] && PROXY_ARG="--proxy socks5://127.0.0.1:1080"

            while [ $RETRY -lt $MAX_RETRY ]; do
              echo ""
              echo "   🎯 تلاش $(($RETRY+1))/$MAX_RETRY (پروکسی: $USE_PROXY, delay: ${WAIT}s)"

              yt-dlp --skip-download --no-playlist --no-cache-dir \
                --no-check-certificates --newline \
                --sleep-requests 2 --sleep-interval 3 --max-sleep-interval 15 \
                --socket-timeout 30 \
                $PROXY_ARG \
                --extractor-args "youtube:player_client=ios,android,web_embedded" \
                --user-agent "Mozilla/5.0 (iPhone; CPU iPhone OS 16_0 like Mac OS X) AppleWebKit/605.1.15" \
                --write-sub --sub-lang "fa.*,en.*" \
                --write-auto-sub --sub-lang "fa.*,en.*" \
                --output "${OUT_DIR}/%(id)s.%(ext)s" \
                "$URL" 2>&1

              local EXIT_CODE=$?
              local FOUND=$(find "$OUT_DIR" -type f \( -name "*.vtt" -o -name "*.srt" \) 2>/dev/null | wc -l)

              if [ "$FOUND" -gt 0 ]; then
                echo "   ✅ ${FOUND} فایل زیرنویس دریافت شد"
                return 0
              fi

              # اگر 429 یا خطای ریت‌لیمیت بود
              if grep -qi "429\|too many requests\|rate limit" "$OUT_DIR/../ytdlp_*.log" 2>/dev/null || [ $EXIT_CODE -ne 0 ]; then
                echo "   ⚠️ خطا / ریت‌لیمیت - ${WAIT}s صبر..."
                sleep $WAIT
                WAIT=$((WAIT * 2))
                [ $WAIT -gt 60 ] && WAIT=60

                # اگر پروکسی فعال بود، WARP رو ریست کن
                if [ "$USE_PROXY" = "true" ] && [ $RETRY -ge 2 ]; then
                  echo "   🔄 ریستارت WARP برای IP جدید..."
                  docker restart warp 2>/dev/null
                  sleep 15
                fi
              else
                echo "   ❌ زیرنویس موجود نیست (نه ریت‌لیمیت)"
                return 1
              fi

              RETRY=$((RETRY+1))
            done
            return 1
          }

          # ========== FONT ==========
          EMBED="${EMBED_FONT:-false}"
          if [ "$EMBED" = "true" ]; then
            curl -sL "https://github.com/mahdi-marjani-moghadam/wg/blob/bf01f79257b3329feab7d5b818e6d62d56e8e7fd/DOCUMENT/theme/css/fonts/IRANSans/ttf/IRANSansWeb.ttf" -o "$FONT_FILE" \
              && echo "✅ فونت دریافت شد" \
              || { echo "⚠️ فونت دریافت نشد"; EMBED="false"; }
          fi

          # ========== MAIN LOOP ==========
          INDEX=0
          for URL in ${YT_URLS}; do
            INDEX=$((INDEX+1))
            echo ""
            echo "============================================================"
            echo "🔗 ویدیو $INDEX : $URL"
            echo "============================================================"

            # استخراج video ID
            VID_ID=$(echo "$URL" | grep -oP '(?<=v=)[a-zA-Z0-9_-]+' || echo "vid_${INDEX}")
            TMP_DIR="tmp_subs_${VID_ID}_$$"
            mkdir -p "$TMP_DIR"

            # ====== شروع WARP ======
            USE_PROXY="false"
            if start_warp; then
              USE_PROXY="true"
            fi

            # ====== دانلود ======
            SUCCESS=false
            if try_download_subs "$URL" "$TMP_DIR" "$USE_PROXY"; then
              SUCCESS=true
            elif [ "$USE_PROXY" = "true" ]; then
              # با پروکسی نشد → یکبار دیگه بدون پروکسی
              echo "   🔄 تلاش بدون پروکسی..."
              stop_warp
              USE_PROXY="false"
              if try_download_subs "$URL" "$TMP_DIR" "false"; then
                SUCCESS=true
              fi
            fi

            if [ "$SUCCESS" = "false" ]; then
              echo "❌ هیچ زیرنویسی برای این ویدیو پیدا نشد"
              stop_warp
              rm -rf "$TMP_DIR"
              continue
            fi

            # ====== بسته‌بندی ======
            SAFE_ID=$(echo "$VID_ID" | tr -cd 'a-zA-Z0-9_-')
            FINAL_FOLDER="${SAFE_ID}_$(date +%s)"
            FINAL_PATH="${BACKUP_DIR}/${FINAL_FOLDER}"
            mkdir -p "$FINAL_PATH"

            # کپی زیرنویس‌ها (find -exec = امن در برابر فاصله)
            find "$TMP_DIR" -type f \( -name "*.vtt" -o -name "*.srt" \) -exec cp {} "$FINAL_PATH/" \;

            # فونت
            if [ "$EMBED" = "true" ] && [ -f "$FONT_FILE" ]; then
              cp "$FONT_FILE" "$FINAL_PATH/"
            fi

            # زیپ
            cd "$FINAL_PATH"
            zip -j subtitle.zip ./* 2>/dev/null
            find . -type f ! -name "subtitle.zip" -delete
            cd - > /dev/null

            # README
            FOLDER_ENC=$(python3 -c "import urllib.parse; print(urllib.parse.quote('${FINAL_FOLDER}', safe=''))")
            RAW_LINK="https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/${BRANCH}/subtitles/${FOLDER_ENC}/subtitle.zip"
            {
              echo "# 📄 زیرنویس"
              echo ""
              echo "| # | فایل | لینک |"
              echo "|---|------|------|"
              echo "| 1 | \`subtitle.zip\` | [دانلود]($RAW_LINK) |"
              echo ""
              echo "📺 منبع: $URL"
              echo ""
              echo "---"
              echo "*ساخته شده توسط avasam.ir*"
              [ "$EMBED" = "true" ] && echo "" && echo "🔤 فونت IRANSans داخل پکیج قرار دارد."
            } > "$FINAL_PATH/README.md"

            echo "✅ ${FINAL_FOLDER} ذخیره شد"
            echo "${FINAL_FOLDER}|$URL" >> /tmp/sub_info.txt

            stop_warp
            rm -rf "$TMP_DIR"
          done

          echo "$BACKUP_DIR" > /tmp/backup_dir_path.txt
          touch /tmp/sub_info.txt

      - name: 📤 بارگذاری در ریپازیتوری
        if: always()
        env:
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          BRANCH: ${{ github.ref_name }}
        run: |
          BACKUP_DIR="/tmp/sub_backup_$$"

          if [ ! -d "$BACKUP_DIR" ] || [ -z "$(find "$BACKUP_DIR" -type f 2>/dev/null)" ]; then
            echo "⚠️ چیزی برای آپلود نیست"
            git fetch origin "$BRANCH" 2>/dev/null || true
            git reset --hard origin/"$BRANCH" 2>/dev/null || true
            mkdir -p subtitles
            [ ! -f "subtitles/README.md" ] && echo "# 📋 زیرنویس‌ها" > subtitles/README.md
            git add -f subtitles/README.md 2>/dev/null
            git diff --cached --quiet || git commit -m "[AVASAM] Init subtitles [skip ci]"
            timeout 60 git push origin HEAD:"$BRANCH" || true
            exit 0
          fi

          git fetch origin "$BRANCH"
          git reset --hard origin/"$BRANCH"
          mkdir -p subtitles

          find "$BACKUP_DIR" -mindepth 1 -maxdepth 1 -exec cp -r {} subtitles/ \;

          MASTER_README="subtitles/README.md"
          {
            echo "# 📋 فهرست زیرنویس‌ها"
            echo ""
            echo "| # | پوشه | منبع |"
            echo "|---|-------|------|"
          } > "$MASTER_README"

          n=0
          for folder in subtitles/*/; do
            [ -d "$folder" ] || continue
            fname="$(basename "$folder")"
            [ ! -f "$folder/README.md" ] && continue
            n=$((n+1))
            SRC_URL=$(grep "$fname" /tmp/sub_info.txt 2>/dev/null | cut -d'|' -f2 || echo "-")
            fenc="$(python3 -c "import urllib.parse; print(urllib.parse.quote('${fname}', safe=''))")"
            echo "| $n | [${fname}](https://github.com/${REPO_OWNER}/${REPO_NAME}/tree/${BRANCH}/subtitles/${fenc}) | ${SRC_URL} |" >> "$MASTER_README"
          done

          git add -f subtitles/
          if ! git diff --cached --quiet; then
            git commit -m "[AVASAM] Subtitle download [skip ci]"
            for i in {1..10}; do
              timeout 300 git push origin HEAD:"$BRANCH" && break
              echo "⏳ تلاش مجدد $i..."
              sleep 5
              git fetch origin "$BRANCH"
              git reset --hard origin/"$BRANCH"
              find "$BACKUP_DIR" -mindepth 1 -maxdepth 1 -exec cp -r {} subtitles/ \;
              git add -f subtitles/
              git diff --cached --quiet || git commit -m "[AVASAM] Subtitle download [skip ci]"
            done
          fi

      - name: 🧹 پاکسازی
        if: always()
        run: docker rm -f warp 2>/dev/null; true
