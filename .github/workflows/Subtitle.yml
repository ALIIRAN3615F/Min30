name: "01 - 🎯 دانلود زیرنویس یوتیوب"

on:
  workflow_dispatch:
    inputs:
      video_urls:
        description: '🔗 لینک ویدیو (چند لینک با فاصله)'
        required: true
        type: string
      embed_font:
        description: '🖊️ همراه با فونت فارسی'
        required: false
        default: false
        type: boolean

jobs:
  download-subtitles:
    name: "📥 دریافت زیرنویس"
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: ⚙️ تنظیم Git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

      - name: 🌐 راه‌اندازی WARP
        run: |
          docker run -d --name warp --restart=always -p 1080:1080 --cap-add NET_ADMIN --sysctl net.ipv6.conf.all.disable_ipv6=0 --sysctl net.ipv4.conf.all.src_valid_mark=1 -v warp-data:/var/lib/cloudflare-warp caomingjun/warp
          sleep 10
          echo "✅ WARP آماده"

      - name: 📥 نصب وابستگی‌ها
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y python3-pip zip curl jq
          pip3 install --upgrade yt-dlp
          yt-dlp --version

      - name: 🔽 دانلود زیرنویس‌ها
        env:
          YT_URLS: ${{ github.event.inputs.video_urls }}
          EMBED_FONT: ${{ github.event.inputs.embed_font }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          BACKUP_DIR="/tmp/sub_backup_$$"
          mkdir -p "$BACKUP_DIR" subtitles

          # اگر فونت خواسته بود، دانلود کن
          if [ "${EMBED_FONT}" = "true" ]; then
            FONT_FILE="/tmp/IRANSansWeb.ttf"
            curl -sL "https://github.com/mahdi-marjani-moghadam/wg/blob/bf01f79257b3329feab7d5b818e6d62d56e8e7fd/DOCUMENT/theme/css/fonts/IRANSans/ttf/IRANSansWeb.ttf" -o "$FONT_FILE" \
              && echo "✅ فونت دریافت شد" \
              || { echo "⚠️ فونت دریافت نشد"; EMBED_FONT="false"; }
          fi

          # YT-DLP با خروجی امن روی VIDEO ID
          # این‌جوری اسم فایل هیچ‌وقت فاصله و کاراکتر عجیب نداره
          YT_DLP_BASE="yt-dlp --skip-download --no-playlist --retries 3 --no-check-certificates --progress --newline"
          YT_DLP_ARGS="--proxy socks5://127.0.0.1:1080 --extractor-args youtube:player_client=mweb,android_vr,android"

          # تابع کمکی برای دانلود زیرنویس یک ویدیو
          download_one() {
            local URL="$1" VID_DIR="$2"
            # از video id برای نام فایل استفاده کن تا امن باشه
            $YT_DLP_BASE $YT_DLP_ARGS \
              --write-sub --sub-lang fa,en \
              --write-auto-sub --sub-lang fa,en \
              --output "${VID_DIR}/%(id)s" \
              "$URL" 2>&1 || true
          }

          INDEX=0
          for URL in ${YT_URLS}; do
            INDEX=$((INDEX+1))
            echo ""
            echo "============================================================"
            echo "🔗 پردازش $INDEX : $URL"
            echo "============================================================"

            # استخراج video ID برای ساخت پوشه موقت
            VID_ID=$(echo "$URL" | grep -oP '(?<=v=)[^&]+' || echo "unknown_${INDEX}")
            TMP_DIR="tmp_subs_${VID_ID}"
            mkdir -p "$TMP_DIR"

            # دانلود کن
            download_one "$URL" "$TMP_DIR"

            # ببین چی دانلود شده
            mapfile -t SUB_FILES < <(find "$TMP_DIR" -type f \( -name "*.vtt" -o -name "*.srt" \) -print0 2>/dev/null || true)

            # اگر زیرنویس نداشت، رد شو
            if [ ${#SUB_FILES[@]} -eq 0 ]; then
              echo "❌ هیچ زیرنویسی برای این ویدیو پیدا نشد"
              rm -rf "$TMP_DIR"
              continue
            fi

            echo "📄 ${#SUB_FILES[@]} فایل زیرنویس دریافت شد"

            # استفاده از video id برای نام پوشه نهایی (کاملاً امن)
            SAFE_ID=$(echo "$VID_ID" | tr -cd 'a-zA-Z0-9_-')
            FINAL_FOLDER="${SAFE_ID}_$(date +%s)"
            FINAL_PATH="${BACKUP_DIR}/${FINAL_FOLDER}"
            mkdir -p "$FINAL_PATH"

            # کپی فایل‌ها با find -exec (بدون مشکل فاصله و کاراکتر خاص)
            find "$TMP_DIR" -type f \( -name "*.vtt" -o -name "*.srt" \) -exec cp {} "$FINAL_PATH/" \;

            # اضافه کردن فونت به پوشه (اگر خواسته شده)
            if [ "${EMBED_FONT}" = "true" ] && [ -f "$FONT_FILE" ]; then
              cp "$FONT_FILE" "$FINAL_PATH/"
            fi

            # زیپ کردن همه فایل‌های داخل پوشه
            cd "$FINAL_PATH"
            zip -j subtitle.zip ./* 2>/dev/null
            # حذف فایل‌های اصلی و فقط zip نگه دار
            find . -type f ! -name "subtitle.zip" -delete
            cd - > /dev/null

            # ساخت README
            FOLDER_ENCODED=$(python3 -c "import urllib.parse; print(urllib.parse.quote('${FINAL_FOLDER}', safe=''))")
            RAW_LINK="https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/${BRANCH}/subtitles/${FOLDER_ENCODED}/subtitle.zip"
            {
              echo "# 📄 زیرنویس ویدیو ${URL}"
              echo ""
              echo "| # | فایل | لینک |"
              echo "|---|------|------|"
              echo "| 1 | \`subtitle.zip\` | [دانلود]($RAW_LINK) |"
              echo ""
              echo "---"
              echo "*ساخته شده توسط avasam.ir*"
              [ "${EMBED_FONT}" = "true" ] && echo "" && echo "🔤 فونت IRANSans داخل پکیج قرار دارد."
            } > "$FINAL_PATH/README.md"

            echo "✅ ذخیره شد در: ${FINAL_FOLDER}"

            # پاکسازی پوشه موقت
            rm -rf "$TMP_DIR"
          done

          # ذخیره مسیر بکاپ برای مرحله بعد
          echo "$BACKUP_DIR" > /tmp/backup_dir_path.txt

      - name: 🛑 توقف WARP
        if: always()
        run: docker stop warp 2>/dev/null; docker rm warp 2>/dev/null; true

      - name: 📤 بارگذاری در ریپازیتوری
        env:
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          BRANCH: ${{ github.ref_name }}
        run: |
          BACKUP_DIR=$(cat /tmp/backup_dir_path.txt)

          # اگر چیزی دانلود نشده بود
          if [ ! -d "$BACKUP_DIR" ] || [ -z "$(find "$BACKUP_DIR" -type f 2>/dev/null)" ]; then
            echo "⚠️ چیزی برای آپلود وجود ندارد"
            git fetch origin "$BRANCH" 2>/dev/null || true
            git reset --hard origin/"$BRANCH" 2>/dev/null || true
            mkdir -p subtitles
            [ ! -f "subtitles/README.md" ] && echo "# 📋 زیرنویس‌ها" > subtitles/README.md
            git add -f subtitles/README.md 2>/dev/null
            git diff --cached --quiet || git commit -m "[AVASAM] Init subtitles [skip ci]"
            timeout 60 git push origin HEAD:"$BRANCH" || true
            exit 0
          fi

          git fetch origin "$BRANCH"
          git reset --hard origin/"$BRANCH"
          mkdir -p subtitles

          # کپی کل محتوا (باز هم با find برای امنیت فایل‌های با فاصله)
          find "$BACKUP_DIR" -mindepth 1 -maxdepth 1 -exec cp -r {} subtitles/ \;

          # بازسازی فهرست
          MASTER_README="subtitles/README.md"
          echo "# 📋 فهرست زیرنویس‌ها" > "$MASTER_README"
          echo "" >> "$MASTER_README"
          echo "| # | پوشه | لینک |" >> "$MASTER_README"
          echo "|---|-------|------|" >> "$MASTER_README"
          n=0
          for folder in subtitles/*/; do
            [ -d "$folder" ] || continue
            fname="$(basename "$folder")"
            [ ! -f "$folder/README.md" ] && continue
            n=$((n+1))
            fenc="$(python3 -c "import urllib.parse; print(urllib.parse.quote('${fname}', safe=''))")"
            echo "| $n | ${fname} | [مشاهده](https://github.com/${REPO_OWNER}/${REPO_NAME}/tree/${BRANCH}/subtitles/${fenc}) |" >> "$MASTER_README"
          done

          git add -f subtitles/
          if ! git diff --cached --quiet; then
            git commit -m "[AVASAM] Subtitle download [skip ci]"
            for i in {1..10}; do
              timeout 300 git push origin HEAD:"$BRANCH" && break
              echo "⏳ تلاش مجدد $i..."
              sleep 5
              git fetch origin "$BRANCH"
              git reset --hard origin/"$BRANCH"
              find "$BACKUP_DIR" -mindepth 1 -maxdepth 1 -exec cp -r {} subtitles/ \;
              git add -f subtitles/
              git diff --cached --quiet || git commit -m "[AVASAM] Subtitle download [skip ci]"
            done
          fi
